<!-- template/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; }
        .navbar {
            background: #1a73e8; color: white; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .navbar a { color: white; text-decoration: none; margin-left: 15px; }
        .navbar a:hover { text-decoration: underline; }
        .messages { padding: 10px 20px; }
        .messages .success { background: #d4edda; color: #155724; padding: 8px; border-radius: 4px; }
        .messages .error   { background: #f8d7da; color: #721c24; padding: 8px; border-radius: 4px; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="navbar">
    <span style="display:block; text-align:center; flex:1;">
        <strong><h2>Employee Management System</h2></strong>
    </span>
    <div>
        {% if user.is_authenticated %}
            <span>👤 {{ user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'signup' %}">Signup</a>
        {% endif %}
    </div>
</div>

    <!-- Flash messages -->
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
            <div class="{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="content">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
